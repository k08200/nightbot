id: nightbot-lint
name: "Nightbot Lint Check"
description: "Verify code passes biome lint"

agent:
  type: command
  command: "npx biome check src/ 2>&1"

steps:
  - action: check_output
    expect: ""

evaluate:
  method: rules
  passThreshold: 100
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 1
    - type: regex
      target: stdout
      value: "No fixes applied"
      weight: 1
