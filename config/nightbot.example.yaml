# LLM config — set OPENROUTER_API_KEY env var or add apiKey here
# llm:
#   apiKey: "sk-or-v1-..."
#   baseUrl: "https://openrouter.ai/api/v1"
models:
  planner: "anthropic/claude-sonnet-4-5"
  scout: "anthropic/claude-sonnet-4-5"
  secretary: "anthropic/claude-sonnet-4-5"
  lightweight: "anthropic/claude-haiku-4-5"
sandbox:
  image: "nightbot-sandbox:latest"
  memory: "8g"
  cpus: 4
  network: "host"
  auto_destroy: true
escalation:
  slack_webhook: ""
  slack_channel: ""
  cooldown_minutes: 30
circuit_breakers:
  same_error_limit: 3
  iteration_limit: 20
  timeout_per_task_hours: 6
  total_timeout_hours: 10
  replan_limit: 5
scheduler:
  check_interval_seconds: 300
paths:
  plans: "./plans"
  reports: "./reports"
  decisions: "./decisions"
  queue: "./queue"
  agents: "./config/agents"
