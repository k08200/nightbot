ollama:
  host: "http://localhost:11434"
models:
  planner: "qwen2.5:32b"
  scout: "qwen2.5-coder:14b"
  secretary: "qwen2.5:32b"
  lightweight: "llama3.1:8b"
sandbox:
  image: "nightbot-sandbox:latest"
  memory: "8g"
  cpus: 4
  network: "host"
  auto_destroy: true
escalation:
  slack_webhook: ""
  slack_channel: ""
  cooldown_minutes: 30
circuit_breakers:
  same_error_limit: 3
  iteration_limit: 20
  timeout_per_task_hours: 6
  total_timeout_hours: 10
  replan_limit: 5
scheduler:
  check_interval_seconds: 300
paths:
  plans: "./plans"
  reports: "./reports"
  decisions: "./decisions"
  queue: "./queue"
  agents: "./config/agents"
